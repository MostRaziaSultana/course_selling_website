{% extends 'base.html' %}
{% load static %}
{% block title %} Sign Up {% endblock %}
{% block body %}


	<!-- START SECTION TOP -->
	<section class="section-top">
		<div class="container">
			<div class="col-lg-10 offset-lg-1 text-center">
				<div class="section-top-title wow fadeInRight" data-wow-duration="1s" data-wow-delay="0.3s" data-wow-offset="0">
					<h1>Register Page</h1>
					<ul>
						<li><a href="/">Home</a></li>
						<li> / Register</li>
					</ul>
				</div>
			</div>
		</div>
	</section>



<section class="login_register section-padding">
    <div class="container">
        <div class="row">
            <div class="col-lg-6 offset-lg-3 col-xs-12">
                <div class="register">
                    <h4 class="login_register_title">Create a new account:</h4>
                    <form method="POST" action="{% url 'registration' %}">
                        {% csrf_token %}
                        <div class="form-group">
                            <label for="username">Username</label>
                            <input type="text" id="username" class="form-control requiredField input-label"
                                   name="username" required>
                        </div>

                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" class="form-control requiredField input-label"
                                   name="email" required>
                        </div>
                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" class="form-control requiredField input-label"
                                   name="password" required>
                        </div>
                        <div class="form-group">
                            <label for="password">Confirm Password</label>
                            <input type="password" id="password" class="form-control requiredField input-label"
                                   name="password1" required>
                        </div>
                        <div class="form-group col-lg-12">
                            <button class="btn_one" type="submit">Signup now</button>
                        </div>
                    </form>
                    <p>Already have an account? <a href="{% url 'login' %}">Login</a></p>
                </div>
            </div>
        </div>
    </div>
</section>


{% endblock %}
