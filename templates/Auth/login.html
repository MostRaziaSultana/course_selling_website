{% extends 'base.html' %}
{% load static %}
{% block title %} Login {% endblock %}
{% block body %}

	<!-- START SECTION TOP -->
	<section class="section-top">
		<div class="container">
			<div class="col-lg-10 offset-lg-1 text-center">
				<div class="section-top-title wow fadeInRight" data-wow-duration="1s" data-wow-delay="0.3s" data-wow-offset="0">
					<h1>Login Page</h1>
					<ul>
						<li><a href="/">Home</a></li>
						<li> / Login Page</li>
					</ul>
				</div>
			</div>
		</div>
	</section>
	<!-- END SECTION TOP -->

	<!-- START LOGIN -->
<section class="login_register section-padding">
    <div class="container">
        <div class="row">
            <div class="col-lg-6 offset-lg-3 col-xs-12">
                <div class="login">
                    <h4 class="login_register_title">Already a member? Sign in:</h4>
                    <form method="POST" action="{% url 'login' %}">
                        {% csrf_token %}
                        <div class="form-group">
                            <label for="username">Username</label>
                            <input type="text" id="username" class="form-control requiredField input-label"
                                   name="username" required>
                        </div>
                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" class="form-control requiredField input-label"
                                   name="password" required>
                        </div>
                        <div class="form-group col-lg-12">
                            <button class="btn_one" type="submit">Login</button>
                        </div>
                        <div class="form-group col-lg-12 text-center">
                            <p><a href="{% url 'forgot_password' %}">Forgot Password?</a></p>
                        </div>

                    </form>
                    <p>Don't have an account? <a href="{% url 'registration' %}">Register Now</a></p>
                </div>
            </div>
        </div>
    </div>
</section>
<!-- END LOGIN -->


{% endblock %}
