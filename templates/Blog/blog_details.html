{% extends 'base.html' %}
{% load static %}
{% block title %} Blog Details {% endblock %}
{% block body %}

<!-- START SECTION TOP -->
<section class="section-top">
  <div class="container">
    <div class="col-lg-10 offset-lg-1 text-center">
      <div class="section-top-title wow fadeInRight" data-wow-duration="1s" data-wow-delay="0.3s">
        <h1>Single Blog</h1>
        <ul>
          <li><a href="/">Home</a></li>
          <li> / Blog Details</li>
        </ul>
      </div>
    </div>
  </div>
</section>
<!-- END SECTION TOP -->

<style>
  .blog-image {
    max-width: 600px;
    width: 100%;
    height: auto;
    border-radius: 10px;
    margin-bottom: 20px;
  }
  .placeholder-icon {
    width: 200px;
    height: 200px;
    background-color: #e9ecef;
    border-radius: 50%;
    display: inline-block;
    margin-bottom: 20px;
  }
  .text-start {
    font-size: 1.1rem;
    line-height: 1.8;
    color: #555;
    text-align: left;
    margin-top: 20px;
  }
  .blog-title {
    font-size: 1.4rem; /* Reduced size */
    font-weight: 600;
    color: #333;
    margin-bottom: 1.5rem;
  }
</style>

<!-- BLOG DETAILS SECTION -->
<section class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8 text-center">
        {% if blog_details.image %}
          <img src="{{ blog_details.image.url }}" alt="{{ blog_details.title }}" class="img-fluid blog-image">
        {% else %}
          <div class="placeholder-icon"></div>
        {% endif %}

        <h2 class="blog-title">{{ blog_details.title }}</h2>

        <div class="text-start">
          {{ blog_details.content|safe }}
        </div>
      </div>
    </div>
  </div>
</section>

{% endblock %}
