{% extends 'base.html' %}
{% load static %}
{% block title %} Change Password {% endblock %}
{% block body %}

<!-- START SECTION TOP -->
<section class="section-top">
    <div class="container">
        <div class="col-lg-10 offset-lg-1 text-center">
            <div class="section-top-title wow fadeInRight" data-wow-duration="1s" data-wow-delay="0.3s">
                <h1>Change Password</h1>
            </div>
        </div>
    </div>
</section>
<!-- END SECTION TOP -->

<!-- START CHANGE PASSWORD -->
<section class="login_register section-padding">
    <div class="container">
        <div class="row">
            <div class="col-lg-6 offset-lg-3 col-xs-12">
                <div class="login">
                    <h4 class="login_register_title">Reset Your Password</h4>
                    <p class="text-muted">Enter your new password below to update your account security.</p>

                    <!-- Change Password Form -->
                    <form method="POST" action="{% url 'change_password' token %}">
                        {% csrf_token %}
                        <div class="form-group">
                            <label for="new_password">New Password</label>
                            <input type="password" id="new_password" class="form-control requiredField input-label" name="new_password" required>
                        </div>
                        <div class="form-group">
                            <label for="confirm_password">Confirm Password</label>
                            <input type="password" id="confirm_password" class="form-control requiredField input-label" name="confirm_password" required>
                        </div>
                        <div class="form-group col-lg-12">
                            <button class="btn_one" type="submit">Change Password</button>
                        </div>
                    </form>

                    <div class="form-group col-lg-12 text-center">
                        <p><a href="{% url 'login' %}">Back to Login</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
<!-- END CHANGE PASSWORD -->

{% endblock %}
